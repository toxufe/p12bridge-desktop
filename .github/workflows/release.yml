name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DESKTOP_PROJECT: src/P12Bridge.Desktop/P12Bridge.Desktop.csproj
      PUBLISH_DIR: artifacts/publish/P12Bridge.Desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore P12Bridge.sln

      - name: Build
        run: dotnet build P12Bridge.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test P12Bridge.sln --configuration Release --no-build

      - name: Publish desktop app
        run: >
          dotnet publish $env:DESKTOP_PROJECT
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output $env:PUBLISH_DIR

      - name: Package release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "P12Bridge-Desktop-$tag-win-x64.zip"
          $zipPath = Join-Path "artifacts" $zipName
          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          Compress-Archive -Path "$env:PUBLISH_DIR/*" -DestinationPath $zipPath -Force
          "RELEASE_ZIP=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_ZIP }}
          generate_release_notes: true
